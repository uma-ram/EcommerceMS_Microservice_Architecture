# docker-compose.yml
version: '3.8'

services:

  # ── Infrastructure ──────────────────────────────────────
  postgres-user:
    image: postgres:16
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    networks: [ecommerce-net]

  postgres-product:
    image: postgres:16
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    networks: [ecommerce-net]

  postgres-order:
    image: postgres:16
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    networks: [ecommerce-net]

  postgres-payment:
    image: postgres:16
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    networks: [ecommerce-net]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks: [ecommerce-net]

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks: [ecommerce-net]

  # ── Services ─────────────────────────────────────────────
  api-gateway:
    build: ./src/ApiGateway
    ports:
      - "5000:80"
    depends_on: [user-service, product-service, order-service]
    networks: [ecommerce-net]

  user-service:
    build: ./src/UserService
    ports:
      - "5001:80"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres-user;Database=userdb;Username=postgres;Password=postgres
    depends_on: [postgres-user]
    networks: [ecommerce-net]

  product-service:
    build: ./src/ProductService
    ports:
      - "5002:80"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres-product;Database=productdb;Username=postgres;Password=postgres
    depends_on: [postgres-product, redis]
    networks: [ecommerce-net]

  order-service:
    build: ./src/OrderService
    ports:
      - "5003:80"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres-order;Database=orderdb;Username=postgres;Password=postgres
    depends_on: [postgres-order, rabbitmq]
    networks: [ecommerce-net]

  payment-service:
    build: ./src/PaymentService
    ports:
      - "5004:80"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres-payment;Database=paymentdb;Username=postgres;Password=postgres
    depends_on: [postgres-payment, rabbitmq]
    networks: [ecommerce-net]

  notification-service:
    build: ./src/NotificationService
    ports:
      - "5005:80"
    depends_on: [rabbitmq]
    networks: [ecommerce-net]

networks:
  ecommerce-net:
    driver: bridge